<!DOCTYPE html>
<html>
<head>
  <title>SlidesLive Icon Generator</title>
  <style>
    body { margin: 40px; font-family: Arial, sans-serif; background: #f8fafc; }
    h1 { color: #1e293b; }
    h2 { color: #475569; margin-top: 32px; }
    .row { display: flex; align-items: flex-end; gap: 40px; margin: 16px 0 32px; }
    .item { text-align: center; }
    .label { margin-top: 8px; color: #64748b; font-size: 13px; }
    button {
      margin-top: 8px; display: block; width: 100%;
      padding: 6px 12px; background: #3b82f6; color: white;
      border: none; border-radius: 6px; cursor: pointer; font-size: 12px;
    }
    button:hover { background: #2563eb; }
    hr { border: none; border-top: 1px solid #e2e8f0; margin: 32px 0; }
  </style>
</head>
<body>
  <h1>slidesLive Icons</h1>

  <h2>Option A — Slide + bar chart + live dot</h2>
  <div class="row">
    <div class="item"><canvas id="a128" width="128" height="128"></canvas><div class="label">128×128</div><button onclick="dl('a128','icon128.png')">Download</button></div>
    <div class="item"><canvas id="a48"  width="48"  height="48" ></canvas><div class="label">48×48</div><button onclick="dl('a48','icon48.png')">Download</button></div>
    <div class="item"><canvas id="a16"  width="16"  height="16" ></canvas><div class="label">16×16</div><button onclick="dl('a16','icon16.png')">Download</button></div>
  </div>

  <hr>

  <h2>Option B — Bold "sL" monogram</h2>
  <div class="row">
    <div class="item"><canvas id="b128" width="128" height="128"></canvas><div class="label">128×128</div><button onclick="dl('b128','icon128.png')">Download</button></div>
    <div class="item"><canvas id="b48"  width="48"  height="48" ></canvas><div class="label">48×48</div><button onclick="dl('b48','icon48.png')">Download</button></div>
    <div class="item"><canvas id="b16"  width="16"  height="16" ></canvas><div class="label">16×16</div><button onclick="dl('b16','icon16.png')">Download</button></div>
  </div>

  <script>
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawBackground(ctx, s) {
      const bg = ctx.createLinearGradient(0, 0, 0, s);
      bg.addColorStop(0, '#3b82f6');
      bg.addColorStop(1, '#1d4ed8');
      ctx.fillStyle = bg;
      roundRect(ctx, 0, 0, s, s, 22 * (s / 128));
      ctx.fill();
    }

    // Option A: slide + bars + dot
    function drawA(canvas) {
      const ctx = canvas.getContext('2d');
      const s = canvas.width;
      const sc = s / 128;
      drawBackground(ctx, s);

      const sx = 14*sc, sy = 20*sc, sw = s - 28*sc, sh = 72*sc;
      ctx.fillStyle = 'white';
      roundRect(ctx, sx, sy, sw, sh, 6*sc);
      ctx.fill();

      const barW = 14*sc, gap = 10*sc, baseY = sy + sh - 12*sc;
      const bars = [
        { h: 24*sc, color: 'rgba(59,130,246,0.55)' },
        { h: 40*sc, color: 'rgba(59,130,246,0.95)' },
        { h: 30*sc, color: 'rgba(59,130,246,0.72)' },
      ];
      const totalW = bars.length * barW + (bars.length - 1) * gap;
      let bx = sx + (sw - totalW) / 2;
      bars.forEach(b => {
        ctx.fillStyle = b.color;
        roundRect(ctx, bx, baseY - b.h, barW, b.h, 2*sc);
        ctx.fill();
        bx += barW + gap;
      });

      const dotR = 5.5*sc;
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(sx + sw - dotR - 4*sc, sy + dotR + 4*sc, dotR, 0, Math.PI * 2);
      ctx.fill();

      if (s >= 128) {
        ctx.font = `bold ${11*sc}px Arial`;
        ctx.textAlign = 'left';
        const slidesW = ctx.measureText('slides').width;
        const liveW   = ctx.measureText('Live').width;
        const tx = s/2 - (slidesW + liveW) / 2;
        const ty = sy + sh + 18*sc;
        ctx.fillStyle = 'rgba(255,255,255,0.88)';
        ctx.fillText('slides', tx, ty);
        ctx.fillStyle = 'rgba(147,197,253,1)';
        ctx.fillText('Live', tx + slidesW, ty);
      }
    }

    // Option B: bold sL monogram
    function drawB(canvas) {
      const ctx = canvas.getContext('2d');
      const s = canvas.width;
      const sc = s / 128;
      drawBackground(ctx, s);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (s >= 48) {
        // Two-tone: 's' white, 'L' light blue
        const fontSize = 62 * sc;
        ctx.font = `bold ${fontSize}px Arial`;
        const sW = ctx.measureText('s').width;
        const lW = ctx.measureText('L').width;
        const totalW = sW + lW;
        const startX = s / 2 - totalW / 2;
        const y = s / 2 + 2 * sc;
        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.textAlign = 'left';
        ctx.fillText('s', startX, y);
        ctx.fillStyle = 'rgba(186,230,253,1)';
        ctx.fillText('L', startX + sW, y);
      } else {
        // 16px: single white S
        ctx.font = `bold ${10}px Arial`;
        ctx.fillStyle = 'white';
        ctx.fillText('sL', s/2, s/2 + 1);
      }
    }

    ['a128','a48','a16'].forEach(id => drawA(document.getElementById(id)));
    ['b128','b48','b16'].forEach(id => drawB(document.getElementById(id)));

    function dl(id, filename) {
      const canvas = document.getElementById(id);
      const a = document.createElement('a');
      a.download = filename;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
